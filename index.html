<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValoGuessr</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>VALO GUESSR</h1>
        <div class="stats">SCORE: <span id="score-val">0</span></div>
    </header>

    <main>
        <div id="game-container" class="game-card">
            <div id="loading-state">
                <div class="spinner"></div>
                <p>INTERCEPTING AGENT DATA...</p>
            </div>
            
            <div id="quiz-area" class="hidden">
                <div class="mystery-circle">
                    <span id="mystery-icon">?</span>
                    <img id="agent-image" src="" class="hidden">
                </div>

                <div class="hints">
                    <p id="hint-role">CLASS: <span id="role-text">LOADING...</span></p>
                    <div id="quote-container">
                        <p id="hint-quote">"ULTIMATE READY. IDENTIFY TARGET."</p>
                    </div>
                </div>

                <div class="input-section">
                    <input type="text" id="user-guess" placeholder="WHO IS THIS RADIANT?" autocomplete="off">
                    <button id="submit-guess">JUDGE ANSWER</button>
                </div>

                <p id="feedback-message"></p>
                <button id="next-btn" class="hidden">NEXT AGENT →</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 | Valo Guessr | heloooooo</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
